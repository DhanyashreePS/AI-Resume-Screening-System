<!DOCTYPE html>
<html>
<head>

    <title>Jobs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h2>Jobs</h2>
            <p class="text-muted">
                Create a job and upload candidate resumes to screen.
            </p>
        </div>

        <button
            class="btn btn-primary"
            data-bs-toggle="modal"
            data-bs-target="#jobModal">

            + New Job

        </button>

    </div>


    <table class="table table-bordered bg-white">

        <thead class="table-light">

        <tr>

            <th>Title</th>
<th>Company</th>
<th>Required Skills</th>
<th>Candidates</th>
<th>Created</th>
<th>Action</th>

        </tr>

        </thead>

        <tbody>

        {% for job in jobs %}

        <tr>

    <td>{{ job.title }}</td>

    <td>{{ job.company }}</td>

    <td>{{ job.required_skills }}</td>

    <td>
        {{ job.candidate_count }}
    </td>

    <td>{{ job.created_date }}</td>

    <td>

        <a
        href="/job/{{ job.id }}"
        class="btn btn-success btn-sm">

        Open

        </a>

        <a
        href="/delete_job/{{ job.id }}"
        class="btn btn-danger btn-sm"
        onclick="return confirm('Delete this job?')">

        Delete

        </a>

    </td>

</tr>

        {% endfor %}

        </tbody>

    </table>
    </div>
    <div class="modal fade" id="jobModal">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<form action="/create_job" method="POST">

<div class="modal-header">

<h4>Create Job</h4>

<button
type="button"
class="btn-close"
data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<div class="mb-3">

<label>Job Title</label>

<input
type="text"
name="title"
class="form-control"
required>

</div>

<div class="row">

<div class="col-md-6">

<label>Company</label>

<input
type="text"
name="company"
class="form-control">

</div>

<div class="col-md-6">

<label>Location</label>

<input
type="text"
name="location"
class="form-control">

</div>

</div>

<br>

<div class="row">

<div class="col-md-6">

<label>Experience</label>

<input
type="number"
name="experience"
class="form-control">

</div>

<div class="col-md-6">

<label>Education</label>

<select
name="education"
class="form-select">

<option>Any</option>
<option>B.E</option>
<option>B.Tech</option>
<option>MCA</option>
<option>M.Tech</option>

</select>

</div>

</div>

<br>

<div class="mb-3">

<label>Required Skills</label>

<input
type="text"
name="required_skills"
class="form-control"
placeholder="python, flask, sql">

</div>

<div class="mb-3">

<label>Job Description</label>

<textarea
name="job_description"
rows="6"
class="form-control"></textarea>

</div>

</div>

<div class="modal-footer">

<button
class="btn btn-secondary"
data-bs-dismiss="modal">

Cancel

</button>

<button
class="btn btn-primary">

Create Job

</button>

</div>

</form>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
