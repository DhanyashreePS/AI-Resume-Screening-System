<!DOCTYPE html>
<html>

<head>

    <title>Admin Login</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-header bg-primary text-white text-center">

                    <h3>Admin Login</h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            <input
                                type="text"
                                class="form-control"
                                name="username"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                name="password"
                                required>

                        </div>

                        <button
                            class="btn btn-primary w-100"
                            type="submit">

                            Login

                        </button>

                        <div class="text-center my-3">
    <span class="text-muted">──────── OR ────────</span>
</div>

<button
    type="button"
    class="btn btn-outline-dark w-100"
    onclick="alert('Google Sign-In will be available in a future version.')">

    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
         width="20"
         class="me-2">

    Continue with Google

</button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
